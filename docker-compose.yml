# ===================================================
# docker-compose.yml
# DevOps E-Commerce Application
# Services: mysql + springboot app
# ===================================================

version: "3.8"

services:

  # -----------------------------------------------
  # MySQL Database Container
  # -----------------------------------------------
  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Niharika@123
      MYSQL_DATABASE: ecommerce
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

  # -----------------------------------------------
  # Spring Boot Application Container
  # -----------------------------------------------
  app:
    build: .
    container_name: springboot-app
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "9090:9090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ecommerce?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Niharika@123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

# -----------------------------------------------
# Persistent Volume for MySQL data
# -----------------------------------------------
volumes:
  mysql-data:
