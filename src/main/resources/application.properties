# ===================================================
# DevOps E-Commerce Application Configuration
# ===================================================

# Server Port
server.port=9090

# ===================================================
# MySQL Database Configuration
# For LOCAL development: use localhost
# For DOCKER container: use host.docker.internal
# For DOCKER COMPOSE: use mysql (service name)
# ===================================================

spring.datasource.url=jdbc:mysql://mysql:3306/ecommerce?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Niharika@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================
# JPA / Hibernate Configuration
# ===================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===================================================
# Application Name
# ===================================================
spring.application.name=ecommerce
